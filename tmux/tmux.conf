
set -g status on
set -g status-position top
set -g status-interval 5

set -g pane-border-style "fg=#475258"
set -g pane-active-border-style "fg=#a7c080"

set -g status-justify left
set -g status-style "bg=default"

set -g status-left-length 100
set -g status-right-length 150

# Theme on startup
run-shell "~/.config/tmux/themes/random-theme.sh"

# Reload config
bind-key -N "Reload config" R source-file ~/.tmux.conf \; display-message "Config reloaded!"
# Random theme
bind-key -N "Random theme" r run-shell "~/.config/tmux/themes/random-theme.sh"

bind-key -N "Theme selector" t display-menu \
  "Everforest" e "source-file ~/.config/tmux/themes/everforest.conf" \
  "Everfores Box" E "source-file ~/.config/tmux/themes/everforest-box.conf" \
  "Kanagawa" k "source-file ~/.config/tmux/themes/kanagawa.conf" \
  "Kanagawa Box" K "source-file ~/.config/tmux/themes/kanagawa-box.conf" \
  "Sakura" s "source-file ~/.config/tmux/themes/sakura.conf" \
  "Sakura Box" S "source-file ~/.config/tmux/themes/sakura-box.conf" \
  "Tokyo Night" t "source-file ~/.config/tmux/themes/tokyonight.conf" \
  "Tokyo Night Box" T "source-file ~/.config/tmux/themes/tokyonight-box.conf"


set -g window-status-format '#[bg=#{E:@theme_tab_normal_bg}]#[fg=#{E:@theme_tab_normal_fg}]#[italics] #W '
set -g window-status-current-format '#[bg=#{E:@theme_tab_active_bg}]#[fg=#{E:@theme_tab_active_fg}]#[bold] #W '

set -g @theme_prefix_icon "󰌌"

# Left
set -g status-left '#{?pane_in_mode,#[bg=#{E:@theme_tmux_bg}]#[fg=#{E:@theme_tmux_fg}]#[bold] #{?client_prefix,#{E:@theme_prefix_icon},} COPY ,#{?window_zoomed_flag,#[bg=#{E:@theme_session}]#[fg=#{E:@theme_normal_fg}]#[bold] #{?client_prefix,#{E:@theme_prefix_icon},󰊓} ZOOM ,#[bg=#{E:@theme_normal_bg}]#[fg=#{E:@theme_normal_fg}]#[bold] #{?client_prefix,#{E:@theme_prefix_icon},} NORMAL }}#[default] #[fg=#{E:@theme_session}]#[bold] #S '
#set -g status-left '#{?pane_in_mode,#[bg=#{E:@theme_tmux_bg}]#[fg=#{E:@theme_tmux_fg}]#[bold]  COPY ,#{?window_zoomed_flag,#[bg=#{E:@theme_session}]#[fg=#{E:@theme_normal_fg}]#[bold] 󰊓 ZOOM ,#[bg=#{E:@theme_normal_bg}]#[fg=#{E:@theme_normal_fg}]#[bold] #{?client_prefix,#{E:@theme_prefix_icon},} NORMAL }}#[default] #[fg=#{E:@theme_session}]#[bold] #S '
# Right
set -g status-right '#[fg=#{E:@theme_cpu}] 󰍛 #(~/.config/tmux/scripts/cpu.sh)% #[fg=#{E:@theme_ram}] 󰘚 #(~/.config/tmux/scripts/ram.sh) #[fg=#{E:@theme_battery}] 󰂄 #(~/.config/tmux/scripts/battery.sh)% #[fg=#{E:@theme_datetime}]#[bold] %A %d %B %Y %H:%M '

###########
# plugins #
###########

set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.tmux/plugins"

set -g @tpm_plugins 'tmux-plugins/tpm \
tmux-plugins/tmux-sensible \
tmux-plugins/tmux-yank \
christoomey/vim-tmux-navigator \
tmux-plugins/tmux-resurrect \
alexwforsythe/tmux-which-key'

# Floating window
bind-key -N"Floating window" -n M-g if-shell -F '#{==:#{session_name},scratch}' {
  detach-client
} {
  # open in the same directory of the current pane
  display-popup -d "#{pane_current_path}" -E -k "tmux new-session -A -s scratch"
}

# --- terminal & key handling ---
set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"
set -as terminal-features ",*:usstyle"
set -as terminal-features ",*:hyperlinks"

set -s extended-keys on
set -s extended-keys-format csi-u
set -as terminal-features 'xterm*:extkeys'
set -sg escape-time 10

# Modo vim
set -g mode-keys vi
set -g set-clipboard on

### Clipboard
#bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel
# MacOs Clipboard
# bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
# WSL Clipboard
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "clip.exe"

# Keymaps
unbind C-b
set -g prefix C-a
bind C-a send-prefix

unbind %
unbind '"'
bind-key -N "Vertical split" v split-window -h -c "#{pane_current_path}"
bind-key -N "Horizontal split" h split-window -v -c "#{pane_current_path}"

# Mouse support
set -g mouse on

# Sync panes
bind-key -N"Sync Panes" S setw synchronize-panes \; display-message "synchronize-panes: #{?pane_synchronized,on,off}"

# Kill all sessions except current
bind-key -N "Kill other sessions" K confirm-before -p "Kill all other sessions? (y/n)" "kill-session -a"

# Fix index
set -g base-index 1
setw -g pane-base-index 1

# TPM init
run '~/.tmux/plugins/tpm/tpm'
